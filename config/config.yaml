# Knowledge Graph System Configuration

# LLM Configuration
llm:
  # ollama | lmstudio | openai | anthropic | gemini
  provider: lmstudio
  # null = auto-detect: uses the first model currently loaded in LM Studio
  # (actual model name is still logged in benchmark data)
  model: null
  #model: gemma-4-26b-a4b-it-mlx
  #model: qwen3-30b-a3b-instruct-2507-mlx
  #model: qwen3-14b
  # Optional override (defaults: Ollama http://localhost:11434/v1, LM Studio :1234/v1)
  base_url: http://127.0.0.1:1234/v1
  # Environment variable for API key (null = provider default; Ollama/LM Studio often need none)
  api_key_env: null
  timeout_seconds: 300
  temperature: 0.3
  max_new_tokens: 32000
  # Prepend /no_think to disable extended reasoning on thinking models (qwen3, etc.)
  # Prevents token exhaustion before the JSON answer is emitted.
  disable_thinking: true
  # Default chunk settings — used when no model-specific override exists.
  # Words per extraction call. Smaller = better coverage (avoids "lost in the middle"),
  # more LLM calls. Tune per model based on observed extraction quality.
  chunk_size: 300
  overlap: 50
  # fixed = legacy word window; recursive = paragraph/sentence pack (recommended)
  chunk_strategy: recursive
  # Chunks per section for Pass 2b cross-section relationship extraction.
  # 0 or 1 disables the section pass.
  section_size: 5
  # Per-model overrides. Key = model name as reported by the provider.
  # Any field here takes precedence over the defaults above for that model.
  # Prompt format defaults
  # low    = "Return ONLY a JSON array" (current default)
  # medium = adds explicit start/end markers
  # high   = adds inline example + hard constraint
  format_strictness: low
  use_few_shot: false
  model_settings:
    qwen3-30b-a3b-instruct-2507-mlx:
      # Baseline: minimal ~100-word entity prompt; recursive 300/50 chunking.
      chunk_size: 300
      overlap: 50
      chunk_strategy: recursive
      section_size: 5
      disable_thinking: true
      format_strictness: low   # good instruction follower, low is fine
      use_few_shot: false
    gemma-4-26b-a4b-it-mlx:
      chunk_size: 400
      section_size: 4
      format_strictness: medium  # tends to add commentary; enforce markers
      use_few_shot: false

# Pipeline orchestration
pipeline:
  # Parallel LLM calls per chunk batch. Use 1 for local Ollama/LM Studio.
  max_concurrent_llm_calls: 1

# Storage Configuration
storage:
  knowledge_graphs_dir: "data/knowledge_graphs"
  metadata_file: "data/metadata.json"
  documents_dir: "data/documents"
  ontology_dir: "data/ontology"
  ontology_file: "data/ontology/ontology.ttl"

# HTTP API server (main.py server, GUI proxy target)
n8n:
  host: "0.0.0.0"
  port: 5001
  debug: false

# Web GUI dev server (Vite)
gui:
  port: 5173

# Extraction Configuration
extraction:
  entity_extraction:
    enabled: true
  relationship_extraction:
    enabled: true

# Ontology settings
ontology:
  # How to reach the Wikidata MCP server for ontology review
  # subprocess = launch via uvx (no setup needed)
  # http       = connect to a running HTTP server (future)
  # disabled   = skip Wikidata lookups
  wikidata_mcp: subprocess
  wikidata_mcp_url: null

# Graph Visualisation
visualization:
  # Path to the ai-knowledge-graph project containing ttl_to_html.py.
  # null = auto-detect ~/src/ai-knowledge-graph or sibling directory.
  ai_kg_path: null

# Entity Resolution (post-extraction deduplication pass)
entity_resolution:
  enabled: true
  # Strategies applied in order: rule_based | embedding | llm
  strategies:
    - rule_based
    - embedding
    - llm
  # Cosine similarity threshold for embedding-based matching (0–1).
  # 0.92 catches name variants (John / John Smith / Mr Smith) with low false-positive rate.
  # Use 0.95+ for conservative matching, 0.88–0.90 with llm_confirmation: true for aggressive.
  embedding_threshold: 0.92
  # Embedding model served at the same base_url as the LLM
  embedding_model: "text-embedding-nomic-embed-text-v1.5"
  # Use LLM to confirm ambiguous embedding matches before merging
  llm_confirmation: true
  # Canonical form when merging variants: title_case | longer | first_seen
  canonical_form: title_case
  # Known abbreviation expansions (applied by rule_based strategy)
  abbreviation_hints: {}
  #  LLM: Large Language Model
  #  RAG: Retrieval-Augmented Generation

# Domain-specific extraction profiles.
# Use with: python main.py process <file> --domain <name>
# extra_entity_types and extra_predicates are merged with the base defaults.
domains:
  technical:
    description: "Technical documentation, APIs, software systems"
    extra_entity_types:
      - Service
      - Version
      - Configuration
      - Database
      - API
      - Error
      - Module
    extra_predicates:
      - deprecates
      - implements
      - exposes
      - dependsOn
      - isCompatibleWith

  literary:
    description: "Literature, historical narrative, humanities"
    extra_entity_types:
      - Theme
      - Symbol
      - CharacterRole
      - Scene
    extra_predicates:
      - loves
      - betrays
      - opposes
      - rules
      - symbolises

  scientific:
    description: "Scientific papers, research, biology, medicine"
    extra_entity_types:
      - Drug
      - Disease
      - Gene
      - Pathway
      - Method
      - Study
    extra_predicates:
      - inhibits
      - activates
      - correlatesWith
      - causedBy
      - treatedBy
      - expressedIn

  # Narrow profile for the token-conservative `upgrade` funnel (see
  # src/extraction/upgrade/). Deliberately tiny so the constrained LLM prompt
  # stays small: only product/version entities and upgrade-relevant predicates.
  upgrade:
    description: "Product upgrade paths, supported versions, prerequisites, deprecations"
    extra_entity_types:
      - Product
      - SoftwareVersion
    extra_predicates:
      - upgradesTo            # source version -> reachable target version
      - supportedUpgradeFrom  # target version -> supported source version
      - requiresPrerequisite  # version -> prerequisite (literal or entity)
      - deprecatedIn          # feature/version -> version it was deprecated in
      - removedIn             # feature/version -> version it was removed in
      - isCompatibleWith      # version/product -> compatible version/product
      - versionOf             # version -> product
